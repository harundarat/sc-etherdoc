name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1

      - name: Verify Forge version
        run: |
          forge --version
          test "v$(forge --version | awk '/Version:/ { print $3; exit }')" = "$(tr -d '\n' < .foundry-version)"
          test "$(forge config --json | jq -r '.solc')" = "0.8.36"
          test "$(forge config --json | jq -r '.evm_version')" = "paris"
          test "$(forge config --json | jq -r '.optimizer')" = "true"
          test "$(forge config --json | jq -r '.optimizer_runs')" = "200"

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test
