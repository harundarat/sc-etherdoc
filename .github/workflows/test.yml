name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci

jobs:
  quality:
    name: Format, lint, build, and coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1

      - name: Verify Forge version
        run: |
          forge --version
          test "v$(forge --version | awk '/Version:/ { print $3; exit }')" = "$(tr -d '\n' < .foundry-version)"
          test "$(forge config --json | jq -r '.solc')" = "0.8.36"
          test "$(forge config --json | jq -r '.evm_version')" = "paris"
          test "$(forge config --json | jq -r '.optimizer')" = "true"
          test "$(forge config --json | jq -r '.optimizer_runs')" = "200"

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge lint
        run: forge lint --deny warnings src script test

      - name: Enforce contract size budgets
        run: bash script/check-contract-sizes.sh

      - name: Check gas snapshot
        run: bash script/check-gas-snapshot.sh

      - name: Enforce source coverage
        run: bash script/check-coverage.sh

  test:
    name: Unit, fuzz, invariant, and integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1

      - name: Run Forge tests
        run: forge test -vvv

  static-analysis:
    name: Slither static analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1

      - name: Build compiler metadata
        run: forge build --build-info

      - name: Run pinned Slither
        uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        with:
          fail-on: medium
          ignore-compile: true
          slither-config: slither.config.json
          slither-version: 0.11.5
