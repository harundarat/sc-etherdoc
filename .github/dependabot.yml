version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci

  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
