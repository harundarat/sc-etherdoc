[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.36"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
ignored_warnings_from = ["lib/"]
fs_permissions = [
    { access = "read", path = "./config" },
    { access = "read-write", path = "./deployments" },
    { access = "read-write", path = "./proposals" },
]
remappings = [
    "@chainlink/contracts/=lib/chainlink-evm/contracts/",
    "@chainlink/contracts-ccip/=lib/chainlink-ccip/chains/evm/",
    "@openzeppelin/contracts@5.3.0/=lib/openzeppelin-contracts/contracts/",
]

[profile.ci.fuzz]
runs = 1024

[profile.ci.invariant]
runs = 512
depth = 500

[rpc_endpoints]
mantle_sepolia = "${MANTLE_SEPOLIA_RPC_URL}"
ink_sepolia = "${INK_SEPOLIA_RPC_URL}"

[etherscan]
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", chain = 5003 }
ink_sepolia = { key = "${INKSCAN_API_KEY}", chain = 763373 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
